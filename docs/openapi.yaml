openapi: 3.0.3
info:
  title: auto-ops API
  version: 0.1.0
  description: AI e-commerce auto-operation platform
components:
  securitySchemes:
    bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas: {}
paths:
  /health:
    get:
      tags:
      - system
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                    - ok
                  uptime:
                    type: number
                required:
                - status
                - uptime
                additionalProperties: false
  /v1/me:
    get:
      tags:
      - system
      responses:
        '200':
          description: Default Response
  /v1/tenants:
    post:
      tags:
      - tenants
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 120
                slug:
                  type: string
                  minLength: 2
                  maxLength: 60
                  pattern: ^[a-z0-9](?:[a-z0-9-]*[a-z0-9])?$
                plan:
                  type: string
                  enum:
                  - basic
                  - pro
                  - flagship
                  default: basic
              required:
              - name
              - slug
              additionalProperties: false
      responses:
        '200':
          description: Default Response
  /v1/tasks:
    get:
      tags:
      - tasks
      parameters:
      - schema:
          type: string
          enum:
          - todo
          - in_progress
          - waiting
          - done
          - failed
        in: query
        name: status
        required: false
      - schema:
          type: string
          format: uuid
        in: query
        name: parentTaskId
        required: false
      responses:
        '200':
          description: Default Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    tenantId:
                      type: string
                      format: uuid
                    parentTaskId:
                      type: string
                      format: uuid
                      nullable: true
                    title:
                      type: string
                    description:
                      type: string
                      nullable: true
                    kind:
                      type: string
